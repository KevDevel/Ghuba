<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hugame</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>
    <header style="justify-content: space-between;">
        <div class="header__left">
            <a href="{{ url_for('home') }}">
                <svg class="logo" viewBox="0 0 39 39" fill="#fefefe" width="35px">
                    <path d="M39 24H24V6H6V24H24V39H0V6H6V0H39V24Z" />
                </svg>
                <h1 class="header__title">Hugame</h1>
            </a>
        </div>
        <div class="header__right">
            <div class="nav__item right">
                <a href="{{ url_for('login') }}" class="btn nav__item-login">Login</a>
            </div>

            <div class="nav__item right">
                <a href="{{ url_for('signup') }}" class="btn nav__item-signup">SignUp</a>
            </div>
        </div>
    </header>
    <section class="auth-container">
        <div class="auth-box">
            <h2>Log In</h2>

            <form method="POST" action="{{ url_for('login') }}">
                <label for="email">Email:
                    <input class="valid" type="email" id="email" name="email" placeholder="jhondoe@example.com"
                        required>
                </label>
                <label for="password">Password
                    <input class="valid" type="password" id="password" name="password" required>
                </label>

                <button type="submit" class="auth-btn">Enter</button>
            </form>

            <p class="auth-switch">Don't have an account <a href="{{ url_for('signup') }}">Create One</a></p>
        </div>
    </section>
</body>

</html>
